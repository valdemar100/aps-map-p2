server:
  port: 8081

spring:
  application:
    name: microservico-autenticacao
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/authdb}
    username: ${SPRING_DATASOURCE_USERNAME:aps}
    password: ${SPRING_DATASOURCE_PASSWORD:aps123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:aps-map-p2-jwt-secret-key-minimo-32-caracteres}
  expiration-ms: 86400000
