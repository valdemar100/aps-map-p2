<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConnect — Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1419;
            --surface: #1a2332;
            --surface-hover: #243044;
            --border: #2d3a4f;
            --text: #e7ecf3;
            --muted: #8b9cb3;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --error: #ef4444;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59,130,246,.15), transparent);
        }
        .card {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,.3);
        }
        .brand { text-align: center; margin-bottom: 1.75rem; }
        .brand-icon {
            width: 52px; height: 52px;
            margin: 0 auto .75rem;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }
        .brand h1 { font-size: 1.5rem; font-weight: 700; }
        .brand p { color: var(--muted); font-size: .9rem; margin-top: .35rem; }
        .tabs {
            display: flex;
            gap: .5rem;
            margin-bottom: 1.25rem;
            background: var(--bg);
            padding: 4px;
            border-radius: 10px;
        }
        .tabs button {
            flex: 1;
            padding: .6rem;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
        }
        .tabs button.active { background: var(--surface-hover); color: var(--text); }
        .panel { display: none; }
        .panel.active { display: block; }
        label {
            display: block;
            font-size: .8rem;
            font-weight: 500;
            color: var(--muted);
            margin: 1rem 0 .35rem;
        }
        label:first-child { margin-top: 0; }
        input {
            width: 100%;
            padding: .75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: var(--primary); }
        .btn {
            width: 100%;
            margin-top: 1.25rem;
            padding: .85rem;
            border: none;
            border-radius: var(--radius);
            background: var(--primary);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover:not(:disabled) { background: var(--primary-hover); }
        .btn:disabled { opacity: .6; cursor: wait; }
        .success-panel { display: none; text-align: center; padding: .5rem 0; }
        .success-panel.show { display: block; }
        .success-panel .icon {
            width: 72px; height: 72px;
            margin: 0 auto 1rem;
            background: rgba(34,197,94,.15);
            color: var(--success);
            border-radius: 50%;
            font-size: 2.25rem;
            line-height: 72px;
        }
        .success-panel h2 { font-size: 1.25rem; margin-bottom: .5rem; }
        .success-panel p { color: var(--muted); font-size: .95rem; }
        .success-panel .btn { margin-top: 1.25rem; text-decoration: none; display: block; background: var(--success); }
        .success-panel .btn:hover { filter: brightness(1.08); }
        .form-wrap.hidden { display: none; }
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            padding: .85rem 1.25rem;
            border-radius: var(--radius);
            font-size: .9rem;
            font-weight: 500;
            opacity: 0;
            transition: all .3s;
            z-index: 100;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.ok { background: var(--success); color: #fff; }
        .toast.err { background: var(--error); color: #fff; }
    </style>
</head>
<body>
    <main class="card">
        <header class="brand">
            <div class="brand-icon" aria-hidden="true">🎓</div>
            <h1>EduConnect</h1>
            <p>Acesse sua conta para ver cursos e matrículas</p>
        </header>

        <section id="formWrap" class="form-wrap">
            <nav class="tabs" aria-label="Tipo de acesso">
                <button type="button" class="active" data-tab="login">Entrar</button>
                <button type="button" data-tab="cadastro">Criar conta</button>
            </nav>

            <section id="login" class="panel active">
                <label for="loginUser">Usuário</label>
                <input id="loginUser" type="text" autocomplete="username" placeholder="Seu usuário">
                <label for="loginPass">Senha</label>
                <input id="loginPass" type="password" autocomplete="current-password" placeholder="Sua senha">
                <button type="button" class="btn" id="btnLogin">Entrar</button>
            </section>

            <section id="cadastro" class="panel">
                <label for="cadLogin">Usuário</label>
                <input id="cadLogin" type="text" autocomplete="username" placeholder="Escolha um usuário">
                <label for="cadNome">Nome completo</label>
                <input id="cadNome" type="text" autocomplete="name" placeholder="Seu nome">
                <label for="cadSenha">Senha</label>
                <input id="cadSenha" type="password" autocomplete="new-password" placeholder="Crie uma senha">
                <button type="button" class="btn" id="btnCadastro">Criar conta</button>
            </section>
        </section>

        <section id="successPanel" class="success-panel">
            <div class="icon" aria-hidden="true">✓</div>
            <h2 id="welcomeMsg">Bem-vindo!</h2>
            <p>Você já pode acessar os cursos.</p>
            <a href="http://127.0.0.1:8082" class="btn" id="linkAcademico">Ir para os cursos</a>
        </section>
    </main>

    <aside id="toast" class="toast" role="status"></aside>

    <script>
        const ACADEMIC_URL = 'http://127.0.0.1:8082';

        document.querySelectorAll('.tabs button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        function toast(msg, ok) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show ' + (ok ? 'ok' : 'err');
            setTimeout(() => el.classList.remove('show'), 3500);
        }

        function urlPortalAcademico(login, token) {
            const params = new URLSearchParams({ login, token });
            return ACADEMIC_URL + '?' + params.toString();
        }

        function showSuccess(nome, token) {
            document.getElementById('formWrap').classList.add('hidden');
            document.getElementById('successPanel').classList.add('show');
            document.getElementById('welcomeMsg').textContent = 'Olá, ' + (nome || 'aluno') + '!';
            const destino = urlPortalAcademico(nome, token);
            document.getElementById('linkAcademico').href = destino;
            setTimeout(() => { window.location.href = destino; }, 1200);
        }

        document.getElementById('btnLogin').addEventListener('click', async () => {
            const login = document.getElementById('loginUser').value.trim();
            const senha = document.getElementById('loginPass').value;
            const btn = document.getElementById('btnLogin');
            if (!login || !senha) return toast('Preencha usuário e senha', false);

            btn.disabled = true;
            btn.textContent = 'Entrando...';
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, senha })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    toast(res.status === 401 ? 'Usuário ou senha incorretos' : 'Não foi possível entrar', false);
                    return;
                }
                showSuccess(login, data.token);
            } catch {
                toast('Serviço temporariamente indisponível', false);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        });

        document.getElementById('btnCadastro').addEventListener('click', async () => {
            const login = document.getElementById('cadLogin').value.trim();
            const nome = document.getElementById('cadNome').value.trim();
            const senha = document.getElementById('cadSenha').value;
            const btn = document.getElementById('btnCadastro');
            if (!login || !nome || !senha) return toast('Preencha todos os campos', false);

            btn.disabled = true;
            btn.textContent = 'Criando...';
            try {
                const res = await fetch('/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, nome, senha })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    toast(data.erro || 'Não foi possível criar a conta', false);
                    return;
                }
                toast('Conta criada! Agora faça login.', true);
                document.querySelector('[data-tab="login"]').click();
                document.getElementById('loginUser').value = login;
            } catch {
                toast('Serviço temporariamente indisponível', false);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Criar conta';
            }
        });
    </script>
</body>
</html>
