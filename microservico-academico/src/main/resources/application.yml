server:
  port: 8082

spring:
  application:
    name: microservico-academico
  datasource:
    url: jdbc:h2:mem:academicdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  secret: ${JWT_SECRET:aps-map-p2-jwt-secret-key-minimo-32-caracteres}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
